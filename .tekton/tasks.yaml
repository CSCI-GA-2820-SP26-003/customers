apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: run-lint
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -euo pipefail
        pip install -U pip pipenv
        pipenv install --system --dev
        flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 service tests --count --max-complexity=10 --max-line-length=127 --statistics
        pylint service tests --max-line-length=127
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-test
spec:
  workspaces:
    - name: source
  sidecars:
    - name: postgres
      image: postgres:15-alpine
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: postgres
      readinessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - postgres
  steps:
    - name: run-tests
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        - name: RETRY_COUNT
          value: "1"
      script: |
        #!/bin/bash
        set -euo pipefail
        pip install -U pip pipenv
        pipenv install --system --dev
        python3 - <<'EOF'
        import socket, time, sys
        for i in range(60):
            try:
                socket.create_connection(("localhost", 5432), timeout=1)
                print("Postgres is ready!")
                sys.exit(0)
            except (socket.error, ConnectionRefusedError):
                time.sleep(1)
        print("Postgres did not become ready in time")
        sys.exit(1)
        EOF
        pytest --pspec --cov=service --cov-fail-under=95 --disable-warnings
