apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: run-lint
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -euo pipefail
        pip install -U pip pipenv
        pipenv install --system --dev
        flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 service tests --count --max-complexity=10 --max-line-length=127 --statistics
        pylint service tests --max-line-length=127
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-test
spec:
  workspaces:
    - name: source
  sidecars:
    - name: postgres
      image: postgres:15-alpine
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: postgres
      readinessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - postgres
  steps:
    - name: run-tests
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        - name: RETRY_COUNT
          value: "1"
      script: |
        #!/bin/bash
        set -euo pipefail
        pip install -U pip pipenv
        pipenv install --system --dev
        python3 - <<'EOF'
        import socket, time, sys
        for i in range(60):
            try:
                socket.create_connection(("localhost", 5432), timeout=1)
                print("Postgres is ready!")
                sys.exit(0)
            except (socket.error, ConnectionRefusedError):
                time.sleep(1)
        print("Postgres did not become ready in time")
        sys.exit(1)
        EOF
        pytest --pspec --cov=service --cov-fail-under=95 --disable-warnings
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bdd-test
spec:
  params:
    - name: BASE_URL
      description: The external OpenShift route URL for the deployed microservice
      type: string
  workspaces:
    - name: source
  steps:
    - name: run-bdd-tests
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: BASE_URL
          value: $(params.BASE_URL)
      script: |
        #!/bin/bash
        set -euo pipefail
        apt-get update && apt-get install -y --no-install-recommends \
          chromium chromium-driver
        pip install -U pip pipenv
        pipenv install --system --dev
        behave

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-image
spec:
  workspaces:
    - name: source
  params:
    - name: image-name
      description: The fully qualified name of the new image to deploy
      type: string
    - name: manifest-dir
      description: The directory in source that contains yaml manifests
      type: string
      default: "k8s"
  steps:
    - name: deploy
      image: quay.io/openshift/origin-cli:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "Applying manifests in $(params.manifest-dir) directory..."
        oc apply -f $(params.manifest-dir)/deployment.yaml
        oc apply -f $(params.manifest-dir)/service.yaml
        oc apply -f $(params.manifest-dir)/ingress.yaml 

        echo "Updating deployment with image: $(params.image-name)"
        oc set image deployment/customers customers=$(params.image-name)

        echo "Waiting for rollout..."
        oc rollout status deployment/customers --timeout=300s
