apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customers
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customers
                port:
                  number: 8080
